name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    # အောင်မြင်ခဲ့တဲ့ build စနစ်ကို ပြန်သုံးပြီး test တွေကို ကျော်ခိုင်းထားပါတယ်
    - name: Build with Gradle
      run: ./gradlew build -x test

    # ထွက်လာသမျှ output ဖိုင် (JAR သို့မဟုတ် APK) အားလုံးကို အလိုအလျောက် ရှာပြီး တင်ခိုင်းလိုက်ပါတယ်
    - name: Share Output on GitHub Releases
      uses: marvinpinto/action-automatic-releases@latest
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        automatic_release_tag: "latest-build"
        prerelease: true
        title: "CodeAssist Nightly Build"
        files: |
          **/build/outputs/**/*.apk
          **/build/libs/**/*.jar
